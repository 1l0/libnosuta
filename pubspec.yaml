name: libnosuta
description: native libs for nosuta
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.5.0-323

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: tokyo.oykot.libnosuta
        pluginClass: LibnosutaPlugin
      ios:
        pluginClass: LibnosutaPlugin
      linux:
        pluginClass: LibnosutaPlugin
      macos:
        pluginClass: LibnosutaPlugin
      windows:
        pluginClass: LibnosutaPluginCApi
